igj", "p": 3000, "en": "Kallmet Prestigj"}, {"producer": "Medaur", "sq": "Kallmet Privilegj", "p": 5500, "en": "Kallmet Privilegj"}, {"producer": "Medaur", "sq": "Kallmet i Bardhë", "p": 2000, "en": "Kallmet i Bardhë"}]}]}];
const CUR = "L";
let lang = "sq", navLock = false, navLockTimer = null;
const menuEl = document.getElementById("menu");
const catbarEl = document.getElementById("catbar");

function fmtPrice(p){
  let s = String(p), out = "";
  while(s.length > 3){ out = "." + s.slice(-3) + out; s = s.slice(0,-3); }
  return s + out;
}
function esc(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function itemRow(it){
  const nm = esc(lang==="sq" ? it.sq : (it.en||it.sq));
  const sz = it.sz ? ` <span class="sz">${esc(it.sz)}</span>` : "";
  let det = "";
  if(it.kantina || it.rajoni){
    const d1 = [it.kantina, it.rajoni, it.varieteti].filter(Boolean).map(esc).join(" · ");
    const d2 = [it.vol, it.abv].filter(Boolean).map(esc).join(" · ");
    if(d1) det += `<div class="wdet">${d1}</div>`;
    if(d2) det += `<div class="wva">${d2}</div>`;
  }
  return `<div class="item"><div class="row"><span class="name">${nm}${sz}</span>`
       + `<span class="price">${fmtPrice(it.p)} ${CUR}</span></div>${det}</div>`;
}

function groupBlock(g){
  const label = esc(lang==="sq" ? g.sq : (g.en||g.sq));
  let inner = "";
  const hasProd = g.items.some(it => it.producer);
  if(hasProd){
    const order = [], seen = {};
    g.items.forEach(it => { const p = it.producer||""; if(!(p in seen)){ seen[p]=[]; order.push(p); } seen[p].push(it); });
    order.forEach(p => {
      if(p) inner += `<div class="producer">${esc(p)}</div>`;
      inner += seen[p].map(itemRow).join("");
    });
  } else {
    inner = g.items.map(itemRow).join("");
  }
  return `<div class="group"><div class="grp-label">${label}</div>${inner}</div>`;
}

function render(){
  menuEl.innerHTML = ""; catbarEl.innerHTML = "";
  menu.forEach(cat => {
    const a = document.createElement("a");
    a.href = "#" + cat.id; a.dataset.target = cat.id;
    a.textContent = lang==="sq" ? cat.sq : (cat.en||cat.sq);
    a.onclick = (e) => {
      e.preventDefault(); navLock = true;
      [...catbarEl.querySelectorAll("a")].forEach(c => c.classList.toggle("active", c===a));
      const t = document.getElementById(cat.id);
      if(t) t.scrollIntoView({behavior:"smooth",block:"start"});
      a.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
      clearTimeout(navLockTimer); navLockTimer = setTimeout(()=>{navLock=false;}, 850);
    };
    catbarEl.appendChild(a);

    const s = document.createElement("section");
    s.className = "section"; s.id = cat.id;
    const title = esc(lang==="sq" ? cat.sq : (cat.en||cat.sq));
    s.innerHTML = `<div class="sec-head"><h2>${title}</h2></div>`
                + `<div class="groups">${cat.groups.map(groupBlock).join("")}</div>`;
    menuEl.appendChild(s);
  });
  document.querySelectorAll("[data-sq]").forEach(el => { el.textContent = lang==="sq" ? el.dataset.sq : el.dataset.en; });
  document.documentElement.lang = lang;
  setupObserver();
}

function setLang(l){
  lang = l;
  document.getElementById("btn-sq").classList.toggle("active", l==="sq");
  document.getElementById("btn-en").classList.toggle("active", l==="en");
  document.getElementById("btn-sq").setAttribute("aria-pressed", l==="sq");
  document.getElementById("btn-en").setAttribute("aria-pressed", l==="en");
  render();
}

let observer;
function setupObserver(){
  if(observer) observer.disconnect();
  const chips = [...catbarEl.querySelectorAll("a")];
  observer = new IntersectionObserver((entries) => {
    if(navLock) return;
    entries.forEach(en => {
      if(en.isIntersecting){
        const id = en.target.id;
        chips.forEach(c => {
          const on = c.dataset.target === id;
          c.classList.toggle("active", on);
          if(on) c.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
        });
      }
    });
  }, {rootMargin:"-48px 0px -72% 0px", threshold:0});
  menu.forEach(cat => { const el = document.getElementById(cat.id); if(el) observer.observe(el); });
}

render();
</script>
